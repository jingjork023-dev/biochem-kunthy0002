        // Audio Context for feedback
        let audioCtx = null;
        function playTone(freq, type, duration) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
        const playCorrect = () => playTone(880, 'sine', 0.2);
        const playWrong = () => playTone(220, 'square', 0.2);

        let totalQuestions = 0;

        function initMCQs() {
            const container = document.getElementById('quiz-container');
            let currentChapter = "";

            mcqs.forEach((m, idx) => {
                // Insert Chapter Header
                if (m.c !== currentChapter) {
                    currentChapter = m.c;
                    const chapterHeader = document.createElement('div');
                    chapterHeader.className = "chapter-header text-white px-6 py-4 rounded-xl shadow-md mt-10 mb-6";
                    chapterHeader.innerHTML = `<h2 class="text-2xl font-bold">${currentChapter}</h2>`;
                    container.appendChild(chapterHeader);
                }

                totalQuestions++;
                
                const qDiv = document.createElement('div');
                qDiv.className = 'mcq-wrapper p-5 md:p-6 border border-gray-200 rounded-xl bg-white shadow-sm transition-all duration-300';
                qDiv.id = `wrapper-q${idx}`;
                
                qDiv.innerHTML = `
                    <p class="font-bold text-lg text-gray-800 mb-4 leading-relaxed">${m.q}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 options-grid" id="grid-q${idx}">
                        ${m.o.map((opt, oIdx) => `
                            <label class="flex items-start p-3 md:p-4 border border-gray-200 rounded-xl hover:bg-slate-50 cursor-pointer transition relative group overflow-hidden bg-white">
                                <input type="radio" name="q${idx}" value="${oIdx}" class="mt-1 mr-3 w-5 h-5 text-blue-600 hidden" onchange="checkAnswer(${idx})">
                                <div class="w-5 h-5 mt-0.5 mr-3 border-2 border-gray-300 rounded-full check-indicator flex-shrink-0"></div>
                                <span class="text-gray-700 leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });
            
            document.getElementById('total-qs').textContent = totalQuestions;
        }

        // Logic to check answer instantly when selected
        function checkAnswer(qIdx) {
            const m = mcqs[qIdx];
            const grid = document.getElementById(`grid-q${qIdx}`);
            const wrapper = document.getElementById(`wrapper-q${qIdx}`);
            const labels = grid.querySelectorAll('label');
            const checkedBoxes = grid.querySelectorAll(`input[name="q${qIdx}"]:checked`);
            
            if (checkedBoxes.length === 1) {
                grid.classList.add('disabled-labels');
                let isPerfect = true;
                
                // Evaluate selected boxes
                checkedBoxes.forEach(cb => {
                    const val = parseInt(cb.value);
                    if (m.a.includes(val)) {
                        labels[val].classList.add('option-correct');
                    } else {
                        labels[val].classList.add('option-incorrect');
                        isPerfect = false;
                    }
                });
                
                // Reveal the correct answers that were missed
                m.a.forEach(correctVal => {
                    labels[correctVal].classList.add('option-correct');
                });

                if (isPerfect) {
                    playCorrect();
                    wrapper.classList.add('border-green-300', 'bg-green-50/30');
                } else {
                    playWrong();
                    wrapper.classList.add('border-red-300', 'bg-red-50/30');
                }
            }
        }

        function gradeQuiz() {
            let totalScore = 0;
            
            mcqs.forEach((m, idx) => {
                const checkedBoxes = document.querySelectorAll(`input[name="q${idx}"]:checked`);
                let isPerfect = false;

                if (checkedBoxes.length === 1) {
                    isPerfect = true;
                    checkedBoxes.forEach(cb => {
                        if (!m.a.includes(parseInt(cb.value))) {
                            isPerfect = false;
                        }
                    });
                }
                
                if (isPerfect) totalScore++;
                
                // Auto-evaluate any unanswered questions
                if (checkedBoxes.length < 1) {
                     // Provide visual feedback for unanswered questions
                     const grid = document.getElementById(`grid-q${idx}`);
                     grid.classList.add('disabled-labels');
                     const labels = grid.querySelectorAll('label');
                     m.a.forEach(correctVal => {
                         labels[correctVal].classList.add('option-correct');
                     });
                     document.getElementById(`wrapper-q${idx}`).classList.add('border-red-300', 'bg-red-50/30');
                }
            });

            document.getElementById('score').textContent = totalScore;
            document.getElementById('result').style.display = 'block';
            document.getElementById('submit-btn-container').style.display = 'none';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
